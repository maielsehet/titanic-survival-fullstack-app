<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="glass-card">
        <h1><i class="fas fa-ship"></i> Titanic Predictor</h1>
        <p class="subtitle">Enter passenger details to see the survival probability.</p>

        <div class="input-grid">
            <div class="input-group">
                <label>Ticket Class</label>
                <select id="Pclass">
                    <option value="1">1st Class (Upper)</option>
                    <option value="2">2nd Class (Middle)</option>
                    <option value="3">3rd Class (Lower)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select id="Sex">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="Age" placeholder="e.g. 25" min="0" max="100">
            </div>

            <div class="input-group">
                <label>Fare (GBP)</label>
                <input type="number" id="Fare" placeholder="e.g. 50" min="0">
            </div>

            <div class="input-group">
                <label>Port of Embarkation</label>
                <select id="Embarked">
                    <option value="S">Southampton</option>
                    <option value="C">Cherbourg</option>
                    <option value="Q">Queenstown</option>
                </select>
            </div>

            <div class="input-group">
                <label>Family Members</label>
                <input type="number" id="Family_size" placeholder="Total relatives" min="0">
            </div>
        </div>

        <button id="predictBtn" onclick="predict()">
            <span id="btnText">Run Prediction</span>
            <div id="loader" class="hidden"></div>
        </button>

        <div id="resultContainer" class="hidden">
            <h2 id="result"></h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
